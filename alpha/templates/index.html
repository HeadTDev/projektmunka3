<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
        <div class="form-container p-4 rounded shadow">
            <h1 class="mb-4 text-center">AI Music Generator</h1>
            <form id="musicForm" class="w-100" method="POST" action="/generate" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" id="title" placeholder="Enter song title">
                </div>
                <div class="mb-3">
                    <label for="genre" class="form-label">Genre</label>
                    <input type="text" name="genre" class="form-control" id="genre" placeholder="e.g. Trap, Pop, Rap">
                </div>
                <div class="mb-3">
                    <label for="language" class="form-label">Target language for translation</label>
                    <select name="language" class="form-select" id="language">
                        <option value="">Select a language</option>
                        <option value="EN">English</option>
                        <option value="ES">Spanish</option>
                        <option value="FR">French</option>
                        <option value="DE">German</option>
                        <option value="HU">Hungarian</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="fileUpload" class="form-label">Upload File (.mp3, .mp4, .wav)</label>
                    <input class="form-control" type="file" name="file" id="fileUpload" accept=".mp3, .mp4, .wav">
                </div>
                <button type="submit" class="btn btn-primary w-100">Generate</button>
            </form>
            <div id="result" class="mt-4 d-none"></div>
                <a href="#" id="listenLink" class="btn btn-outline-secondary mt-4 d-none" target="_blank">Listen</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('musicForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const formData = new FormData(this);
            const response = await fetch('/generate', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                const listenLink = document.getElementById('listenLink');
                listenLink.href = data.audio_url;
                listenLink.classList.remove('d-none');
            }
            else {
                alert('Error generating music. Please try again.');
            }
        });
    </script>
</body>
</html>
